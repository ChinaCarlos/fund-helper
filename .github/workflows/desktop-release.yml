name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Desktop version (e.g. 0.1.0)'
        required: true
        default: '0.1.1'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os_name: macos
          - platform: windows-latest
            os_name: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#desktop-v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building desktop v${VERSION} on ${{ matrix.os_name }}"

      - name: Sync version
        run: node scripts/version.mjs set desktop "${{ steps.ver.outputs.version }}"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # 版本由根目录 package.json 的 packageManager 字段决定，勿在此处重复指定

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --filter fund-helper-desktop

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          # 与 desktop/rust-toolchain.toml 一致；Universal 需在同一 toolchain 上安装双架构 target
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Verify macOS Rust targets
        if: matrix.os_name == 'macos'
        working-directory: desktop
        run: |
          rustup target list --installed
          rustup target list --installed | grep -q 'x86_64-apple-darwin'
          rustup target list --installed | grep -q 'aarch64-apple-darwin'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build Tauri (macOS Universal)
        if: matrix.os_name == 'macos'
        working-directory: desktop
        run: pnpm tauri build --target universal-apple-darwin

      - name: Build Tauri (Windows)
        if: matrix.os_name == 'windows'
        working-directory: desktop
        run: pnpm tauri build

      - name: Rename macOS artifact
        if: matrix.os_name == 'macos'
        shell: bash
        working-directory: desktop
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="$(find src-tauri/target -name '*.dmg' -type f | head -1)"
          if [[ -z "$DMG" ]]; then
            echo "::error::未找到 DMG，列出 src-tauri/target 下的 bundle 目录："
            find src-tauri/target -type d -name bundle 2>/dev/null | head -20
            find src-tauri/target -type f \( -name '*.dmg' -o -name '*.app' \) 2>/dev/null | head -20
            exit 1
          fi
          mkdir -p ../artifacts
          cp "$DMG" "../artifacts/Fund-Helper-${VERSION}-macos.dmg"
          ls -la ../artifacts/

      - name: Rename Windows artifact
        if: matrix.os_name == 'windows'
        shell: pwsh
        working-directory: desktop
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ steps.ver.outputs.version }}"
          $exe = Get-ChildItem -Path src-tauri/target -Recurse -Include *setup*.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "未找到 Windows 安装包（*setup*.exe）"
            Get-ChildItem -Path src-tauri/target -Recurse -Include *.exe,*.msi | Select-Object -First 20
            exit 1
          }
          New-Item -ItemType Directory -Force -Path ../artifacts | Out-Null
          Copy-Item $exe.FullName "../artifacts/Fund-Helper-${version}-windows-setup.exe"
          Get-ChildItem ../artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os_name }}
          path: artifacts/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=desktop-v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Fund Helper Desktop v${{ steps.ver.outputs.version }}
          body: |
            ## Fund Helper 桌面端 v${{ steps.ver.outputs.version }}

            | 平台 | 文件 |
            |------|------|
            | macOS（Universal，Apple Silicon + Intel） | `Fund-Helper-${{ steps.ver.outputs.version }}-macos.dmg` |
            | Windows（x64） | `Fund-Helper-${{ steps.ver.outputs.version }}-windows-setup.exe` |

            安装后使用微信扫码登录养基宝即可查看持仓；通知配置见设置页。
          files: artifacts/*
          draft: false
          prerelease: false
