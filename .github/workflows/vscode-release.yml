name: VS Code Extension Release

on:
  push:
    tags:
      - 'vscode-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version (e.g. 0.1.2)'
        required: true
        default: '0.1.2'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        working-directory: vscode-extension
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#vscode-v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=vscode-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building VS Code extension v${VERSION}"

      - name: Sync version
        run: node scripts/version.mjs set vscode "${{ steps.ver.outputs.version }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 版本由根目录 package.json 的 packageManager 字段决定，勿在此处重复指定

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter fund-helper-vscode build

      - name: Package VSIX
        working-directory: vscode-extension
        run: |
          npx --yes @vscode/vsce@latest package \
            --no-dependencies \
            --githubBranch main \
            --baseImagesUrl "https://raw.githubusercontent.com/${{ github.repository }}/main/vscode-extension" \
            --out "../fund-helper-vscode-${{ steps.ver.outputs.version }}.vsix"

      - name: Verify VSIX contains marketplace icon
        run: |
          VSIX="fund-helper-vscode-${{ steps.ver.outputs.version }}.vsix"
          unzip -l "$VSIX" | grep -F 'extension/media/icon.png'
          test "$(unzip -l "$VSIX" | grep -c 'extension/media/icon.png')" -ge 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-vsix
          path: fund-helper-vscode-*.vsix
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Fund Helper VS Code v${{ steps.ver.outputs.version }}
          body: |
            ## Fund Helper VS Code / Cursor 扩展 v${{ steps.ver.outputs.version }}

            ### 安装

            **方式 A — 从 VSIX 安装（无需 Marketplace）**
            1. 下载下方 `fund-helper-vscode-${{ steps.ver.outputs.version }}.vsix`
            2. VS Code / Cursor → `Cmd+Shift+P` → **Extensions: Install from VSIX…**

            **方式 B — VS Code Marketplace**（若已上架）
            扩展市场搜索 **Fund Helper**

            ### 入口
            - 活动栏柱状图图标 → 侧边栏持仓
            - 状态栏左下角 Fund Helper
            - 底部 Panel → Fund Helper Tab

            文档: [vscode-extension/README.md](https://github.com/${{ github.repository }}/blob/main/vscode-extension/README.md)
          files: fund-helper-vscode-*.vsix
          draft: false
          prerelease: false
